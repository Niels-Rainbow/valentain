<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }

    canvas#love-bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Aurora Blobs ── */
    .aurora-blob {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(90px);
      mix-blend-mode: screen;
    }
    .aurora-blob-1 {
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, #ff4ecd 0%, #7a5cff 60%, transparent 100%);
      top: -15vw; left: -10vw;
      opacity: 0.12;
      animation: auroraA 18s ease-in-out infinite;
    }
    .aurora-blob-2 {
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, #7a5cff 0%, #ff4ecd 50%, transparent 100%);
      bottom: -10vw; right: -5vw;
      opacity: 0.12;
      animation: auroraB 22s ease-in-out infinite;
    }
    .aurora-blob-3 {
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, #ff6eb5 0%, #5c3aff 70%, transparent 100%);
      top: 30%; left: 35%;
      opacity: 0.07;
      animation: auroraA 28s ease-in-out infinite reverse;
    }

    @keyframes auroraA {
      0%   { transform: translate(0%,   0%)   rotate(0deg)    scale(1);    }
      25%  { transform: translate(3%,  -2%)   rotate(1deg)    scale(1.02); }
      50%  { transform: translate(-2%,  3%)   rotate(-1deg)   scale(0.98); }
      75%  { transform: translate(2%,   1%)   rotate(0.5deg)  scale(1.01); }
      100% { transform: translate(0%,   0%)   rotate(0deg)    scale(1);    }
    }
    @keyframes auroraB {
      0%   { transform: translate(0%,  0%)    rotate(0deg)  scale(1);    }
      33%  { transform: translate(-4%, 2%)    rotate(-2deg) scale(1.03); }
      66%  { transform: translate(3%, -3%)    rotate(1deg)  scale(0.97); }
      100% { transform: translate(0%,  0%)    rotate(0deg)  scale(1);    }
    }
  </style>
</head>
<body>

  <!-- Aurora blobs (CSS layer) -->
  <div class="aurora-blob aurora-blob-1"></div>
  <div class="aurora-blob aurora-blob-2"></div>
  <div class="aurora-blob aurora-blob-3"></div>

  <!-- Canvas layer -->
  <canvas id="love-bg-canvas"></canvas>

  <script>
  (function () {
    const canvas = document.getElementById('love-bg-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initAll(); });

    /* ── Palette ── */
    const PINK   = 'rgba(255,78,205,';
    const PURPLE = 'rgba(122,92,255,';
    const ROSE   = 'rgba(255,110,181,';
    const LAVNDR = 'rgba(201,190,255,';

    /* ════════════════════════════════
       1. FLOATING HEARTS
    ════════════════════════════════ */
    const HEART_COUNT = 28;
    let hearts = [];

    function heartPath(x, y, size) {
      ctx.beginPath();
      ctx.moveTo(x, y + size * 0.3);
      ctx.bezierCurveTo(x, y, x - size * 0.5, y, x - size * 0.5, y + size * 0.3);
      ctx.bezierCurveTo(x - size * 0.5, y + size * 0.6, x, y + size * 0.9, x, y + size);
      ctx.bezierCurveTo(x, y + size * 0.9, x + size * 0.5, y + size * 0.6, x + size * 0.5, y + size * 0.3);
      ctx.bezierCurveTo(x + size * 0.5, y, x, y, x, y + size * 0.3);
      ctx.closePath();
    }

    function mkHeart(scatter) {
      const size = 6 + Math.random() * 18;
      return {
        x:           Math.random() * W,
        y:           scatter ? Math.random() * H * 1.2 : H + size * 2,
        size,
        alpha:       0.08 + Math.random() * 0.25,
        speed:       0.25 + Math.random() * 0.55,
        drift:       (Math.random() - 0.5) * 0.35,
        wobble:      Math.random() * Math.PI * 2,
        wobbleSpeed: 0.008 + Math.random() * 0.015,
        pulse:       Math.random() * Math.PI * 2,
        pulseSpeed:  0.02 + Math.random() * 0.02,
        color:       Math.random() < 0.6 ? PINK : (Math.random() < 0.5 ? PURPLE : ROSE),
        glow:        Math.random() < 0.3,
      };
    }

    function initHearts() {
      hearts = Array.from({ length: HEART_COUNT }, () => mkHeart(true));
    }

    function updateHearts() {
      for (let h of hearts) {
        h.y      -= h.speed;
        h.x      += h.drift + Math.sin(h.wobble) * 0.4;
        h.wobble += h.wobbleSpeed;
        h.pulse  += h.pulseSpeed;

        const scale    = 1 + Math.sin(h.pulse) * 0.08;
        const drawSize = h.size * scale;

        ctx.save();
        if (h.glow) { ctx.shadowColor = h.color + '0.8)'; ctx.shadowBlur = 14; }
        ctx.fillStyle = h.color + h.alpha + ')';
        heartPath(h.x, h.y - drawSize, drawSize);
        ctx.fill();
        ctx.restore();

        if (h.y < -h.size * 3) Object.assign(h, mkHeart(false));
      }
    }

    /* ════════════════════════════════
       2. FIREFLY PARTICLES
    ════════════════════════════════ */
    const PARTICLE_COUNT = 55;
    let particles = [];

    function mkParticle(scatter) {
      return {
        x:           Math.random() * W,
        y:           scatter ? Math.random() * H : H + 10,
        r:           1 + Math.random() * 3,
        alpha:       0.15 + Math.random() * 0.5,
        vx:          (Math.random() - 0.5) * 0.5,
        vy:          -(0.2 + Math.random() * 0.6),
        life:        0,
        maxLife:     180 + Math.random() * 200,
        color:       Math.random() < 0.5 ? PINK : (Math.random() < 0.5 ? PURPLE : LAVNDR),
        twinkle:     Math.random() * Math.PI * 2,
        twinkleSpd:  0.03 + Math.random() * 0.05,
      };
    }

    function initParticles() {
      particles = Array.from({ length: PARTICLE_COUNT }, () => mkParticle(true));
    }

    function updateParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx + Math.sin(p.twinkle) * 0.15;
        p.y += p.vy;
        p.life++;
        p.twinkle += p.twinkleSpd;

        const t      = p.life / p.maxLife;
        const fade   = t < 0.1 ? t / 0.1 : t > 0.8 ? 1 - (t - 0.8) / 0.2 : 1;
        const a      = p.alpha * fade * (0.7 + Math.sin(p.twinkle) * 0.3);

        ctx.save();
        ctx.shadowColor = p.color + '0.9)';
        ctx.shadowBlur  = p.r * 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + a + ')';
        ctx.fill();
        ctx.restore();

        if (p.life >= p.maxLife || p.y < -10) particles[i] = mkParticle(false);
      }
    }

    /* ════════════════════════════════
       3. 4-POINT SPARKLE STARS
    ════════════════════════════════ */
    const SPARKLE_COUNT = 20;
    let sparkles = [];

    function mkSparkle(scatter) {
      return {
        x:        Math.random() * W,
        y:        scatter ? Math.random() * H : H + 20,
        size:     2 + Math.random() * 5,
        alpha:    0,
        maxAlpha: 0.2 + Math.random() * 0.5,
        phase:    'in',
        speed:    0.01 + Math.random() * 0.02,
        vy:       -(0.15 + Math.random() * 0.3),
        color:    Math.random() < 0.5 ? PINK : LAVNDR,
        rot:      Math.random() * Math.PI,
        rotSpd:   (Math.random() - 0.5) * 0.03,
        holdT:    0,
      };
    }

    function drawSparkle(s) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.shadowColor = s.color + '0.8)';
      ctx.shadowBlur  = s.size * 3;
      ctx.fillStyle   = s.color + s.alpha + ')';
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        ctx.lineTo(Math.cos(a) * s.size, Math.sin(a) * s.size);
        const m = a + Math.PI / 4;
        ctx.lineTo(Math.cos(m) * s.size * 0.15, Math.sin(m) * s.size * 0.15);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function initSparkles() {
      sparkles = Array.from({ length: SPARKLE_COUNT }, () => mkSparkle(true));
    }

    function updateSparkles() {
      for (let i = 0; i < sparkles.length; i++) {
        const s = sparkles[i];
        s.y   += s.vy;
        s.rot += s.rotSpd;

        if (s.phase === 'in') {
          s.alpha += s.speed;
          if (s.alpha >= s.maxAlpha) { s.alpha = s.maxAlpha; s.phase = 'hold'; s.holdT = 40 + Math.random() * 60; }
        } else if (s.phase === 'hold') {
          if (--s.holdT <= 0) s.phase = 'out';
        } else {
          s.alpha -= s.speed;
          if (s.alpha <= 0 || s.y < -20) { sparkles[i] = mkSparkle(false); continue; }
        }
        drawSparkle(s);
      }
    }

    /* ════════════════════════════════
       4. SOFT GLOW ORBS
    ════════════════════════════════ */
    const ORB_COUNT = 6;
    let orbs = [];

    function mkOrb() {
      return {
        x:          Math.random() * W,
        y:          Math.random() * H,
        r:          60 + Math.random() * 120,
        alpha:      0.02 + Math.random() * 0.05,
        vx:         (Math.random() - 0.5) * 0.18,
        vy:         (Math.random() - 0.5) * 0.18,
        color:      Math.random() < 0.5 ? PINK : PURPLE,
        pulse:      Math.random() * Math.PI * 2,
        pulseSpd:   0.004 + Math.random() * 0.006,
      };
    }

    function initOrbs() {
      orbs = Array.from({ length: ORB_COUNT }, mkOrb);
    }

    function updateOrbs() {
      for (const o of orbs) {
        o.x += o.vx;
        o.y += o.vy;
        o.pulse += o.pulseSpd;

        if (o.x < -o.r)   o.x = W + o.r;
        if (o.x > W + o.r) o.x = -o.r;
        if (o.y < -o.r)   o.y = H + o.r;
        if (o.y > H + o.r) o.y = -o.r;

        const a    = o.alpha * (0.85 + Math.sin(o.pulse) * 0.15);
        const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        grad.addColorStop(0,   o.color + a + ')');
        grad.addColorStop(0.5, o.color + (a * 0.4) + ')');
        grad.addColorStop(1,   o.color + '0)');

        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
    }

    /* ════════════════════════════════
       5. GLOWING BEZIER LOVE LINES
    ════════════════════════════════ */
    let lineTimer = 0;
    let activeLine = null;

    function spawnLine() {
      const x1 = Math.random() * W;
      const y1 = H * 0.3 + Math.random() * H * 0.5;
      const x2 = x1 + (Math.random() - 0.5) * 300;
      const y2 = y1 - 80 - Math.random() * 150;
      activeLine = {
        x1, y1, x2, y2,
        progress: 0,
        alpha:    0,
        phase:    'in',
        holdT:    0,
        color:    Math.random() < 0.5 ? PINK : PURPLE,
        cp: {
          x: (x1 + x2) / 2 + (Math.random() - 0.5) * 100,
          y: Math.min(y1, y2) - 60 - Math.random() * 80,
        },
      };
    }

    function updateLines() {
      lineTimer++;
      if (lineTimer > 200 && !activeLine) { lineTimer = 0; spawnLine(); }
      if (!activeLine) return;

      const l = activeLine;
      if (l.phase === 'in') {
        l.alpha    += 0.015;
        l.progress += 0.018;
        if (l.progress >= 1) { l.progress = 1; l.phase = 'hold'; l.holdT = 60; }
      } else if (l.phase === 'hold') {
        if (--l.holdT <= 0) l.phase = 'out';
      } else {
        l.alpha -= 0.012;
        if (l.alpha <= 0) { activeLine = null; return; }
      }

      const steps = Math.floor(l.progress * 40);
      ctx.save();
      ctx.strokeStyle = l.color + Math.min(l.alpha, 0.25) + ')';
      ctx.lineWidth   = 1;
      ctx.shadowColor = l.color + '0.6)';
      ctx.shadowBlur  = 6;
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const t  = i / 40;
        const bx = (1-t)*(1-t)*l.x1 + 2*(1-t)*t*l.cp.x + t*t*l.x2;
        const by = (1-t)*(1-t)*l.y1 + 2*(1-t)*t*l.cp.y + t*t*l.y2;
        i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
      }
      ctx.stroke();
      ctx.restore();
    }

    /* ── Main Loop ── */
    function initAll() {
      initHearts();
      initParticles();
      initSparkles();
      initOrbs();
    }
    initAll();

    function loop() {
      ctx.clearRect(0, 0, W, H);
      updateOrbs();
      updateLines();
      updateParticles();
      updateSparkles();
      updateHearts();
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
</body>
</html>
